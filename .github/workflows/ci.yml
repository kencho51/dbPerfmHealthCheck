name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# Cancel any in-progress run on the same branch/PR when a new one starts.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint — runs first, fails fast before spending time on tests
  # ---------------------------------------------------------------------------
  lint:
    name: Ruff lint & format
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  # ---------------------------------------------------------------------------
  # Job 2: Tests — runs in parallel with lint; only blocking tests included
  # (UI-smoke and migration tests require live servers / filesystem access)
  # ---------------------------------------------------------------------------
  test:
    name: Pytest
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run tests
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_ui_smoke.py \
            --ignore=tests/test_migrations.py \
            --tb=short \
            -v
