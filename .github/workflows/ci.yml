name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  lint-and-test:
    name: Ruff + Pytest
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --dev

      # -----------------------------------------------------------------------
      # Ruff
      # -----------------------------------------------------------------------

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      # -----------------------------------------------------------------------
      # Pytest  (UI-smoke and migration tests are excluded — they require live
      # servers or filesystem access not available in CI)
      # -----------------------------------------------------------------------

      - name: Run tests
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_ui_smoke.py \
            --ignore=tests/test_migrations.py \
            -v
